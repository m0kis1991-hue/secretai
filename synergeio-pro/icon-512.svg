<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="nb5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b35"/>
      <stop offset="100%" stop-color="#091526"/>
    </linearGradient>
    <linearGradient id="bl5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#nb5)"/>

  <!-- GEAR center (256,208) -->
  <circle cx="256" cy="208" r="118" fill="none" stroke="#b4c0d0" stroke-width="27"/>
  <g transform="translate(256,208)">
    <rect x="-13" y="-149" width="26" height="32" rx="5" fill="#b4c0d0"/>
    <rect x="-13" y="-149" width="26" height="32" rx="5" fill="#b4c0d0" transform="rotate(45)"/>
    <rect x="-13" y="-149" width="26" height="32" rx="5" fill="#b4c0d0" transform="rotate(90)"/>
    <rect x="-13" y="-149" width="26" height="32" rx="5" fill="#b4c0d0" transform="rotate(135)"/>
    <rect x="-13" y="-149" width="26" height="32" rx="5" fill="#b4c0d0" transform="rotate(180)"/>
    <rect x="-13" y="-149" width="26" height="32" rx="5" fill="#b4c0d0" transform="rotate(225)"/>
    <rect x="-13" y="-149" width="26" height="32" rx="5" fill="#b4c0d0" transform="rotate(270)"/>
    <rect x="-13" y="-149" width="26" height="32" rx="5" fill="#b4c0d0" transform="rotate(315)"/>
    <circle r="43" fill="url(#nb5)"/>
  </g>

  <!-- CLIPBOARD body -->
  <rect x="145" y="90" width="222" height="256" rx="18" fill="white"/>

  <!-- Clip top tab -->
  <rect x="190" y="70" width="132" height="52" rx="14" fill="url(#bl5)"/>
  <circle cx="256" cy="93" r="16" fill="url(#nb5)"/>

  <!-- Checklist row 1 -->
  <path d="M172,168 L190,186 L214,150" fill="none" stroke="#1d4ed8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="228" y="164" width="108" height="13" rx="6" fill="#1d4ed8" opacity="0.65"/>

  <!-- Checklist row 2 -->
  <path d="M172,210 L190,228 L214,192" fill="none" stroke="#1d4ed8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="228" y="206" width="90" height="13" rx="6" fill="#1d4ed8" opacity="0.65"/>

  <!-- Checklist row 3 -->
  <path d="M172,252 L190,270 L214,234" fill="none" stroke="#1d4ed8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="228" y="248" width="100" height="13" rx="6" fill="#1d4ed8" opacity="0.65"/>

  <!-- Checklist row 4 -->
  <path d="M172,294 L190,312 L214,276" fill="none" stroke="#1d4ed8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="228" y="290" width="78" height="13" rx="6" fill="#1d4ed8" opacity="0.65"/>

  <!-- WRENCH -->
  <g transform="translate(310,213) rotate(-38)">
    <rect x="-13" y="-59" width="26" height="75" rx="11" fill="url(#bl5)"/>
    <path d="M-13,-59 A22,22 0 0,1 13,-59" fill="none" stroke="url(#bl5)" stroke-width="23" stroke-linecap="round"/>
    <circle cx="0" cy="19" r="18" fill="url(#bl5)"/>
  </g>

  <!-- TEXT -->
  <text x="256" y="408" text-anchor="middle"
        font-family="'Arial Black',Arial,sans-serif"
        font-weight="900" font-style="italic" font-size="54"
        fill="white">Gear<tspan fill="#2563eb">log</tspan></text>
  <rect x="160" y="420" width="192" height="8" rx="4" fill="#2563eb"/>
</svg>
